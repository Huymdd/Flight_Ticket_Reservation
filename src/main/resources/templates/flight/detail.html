<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Chi tiết chuyến bay')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-airplane"></i> Chi tiết chuyến bay</h2>

    <div class="card shadow">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <h4 th:text="${flight.flightCode}">VN123</h4>
                    <p><strong>Máy bay:</strong> <span th:text="${flight.airplane.airplaneName + ' (' + flight.airplane.airplaneModel + ')'}"></span></p>
                    <hr>
                    <div class="row">
                        <div class="col-6">
                            <h6>Điểm đi</h6>
                            <p class="fw-bold" th:text="${flight.departureAirport.airportName}">Tan Son Nhat</p>
                            <p th:text="${flight.departureAirport.city + ', ' + flight.departureAirport.country}">HCM, VN</p>
                            <p class="fs-4 fw-bold" th:text="${#temporals.format(flight.departureTime, 'HH:mm dd/MM/yyyy')}">08:00</p>
                        </div>
                        <div class="col-6">
                            <h6>Điểm đến</h6>
                            <p class="fw-bold" th:text="${flight.arrivalAirport.airportName}">Noi Bai</p>
                            <p th:text="${flight.arrivalAirport.city + ', ' + flight.arrivalAirport.country}">HN, VN</p>
                            <p class="fs-4 fw-bold" th:text="${#temporals.format(flight.arrivalTime, 'HH:mm dd/MM/yyyy')}">10:00</p>
                        </div>
                    </div>
                </div>
                <div class="col-md-6 text-center">
                    <div class="price-tag mt-4" th:text="${#numbers.formatDecimal(flight.basePrice, 0, 'COMMA', 0, 'POINT') + ' VND'}">1,500,000 VND</div>
                    <p class="text-muted">Giá cơ bản / người</p>
                    <p>Còn <strong th:text="${flight.availableSeats}">50</strong> chỗ trống</p>
                    <a th:href="@{/bookings/new(flightId=${flight.flightId}, passengers=1)}"
                       class="btn btn-primary btn-lg mt-3">
                        <i class="bi bi-cart-plus"></i> Đặt vé ngay
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
