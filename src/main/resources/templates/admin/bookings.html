<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý đặt chỗ')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <h2 class="mb-4"><i class="bi bi-journal-text"></i> Quản lý đặt chỗ</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-primary">
                <tr>
                    <th>Mã đặt vé</th>
                    <th>Khách hàng</th>
                    <th>Ngày đặt</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thanh toán</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="booking : ${bookings}">
                    <td th:text="'#' + ${booking.bookingId}"></td>
                    <td th:text="${booking.user.fullName}"></td>
                    <td th:text="${#temporals.format(booking.bookingDate, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VND'}"></td>
                    <td>
                        <span class="booking-status"
                              th:classappend="${booking.bookingStatus.name().toLowerCase()}"
                              th:text="${booking.bookingStatus}"></span>
                    </td>
                    <td>
                        <span class="booking-status"
                              th:classappend="${booking.paymentStatus.name() == 'PAID' ? 'confirmed' : 'pending'}"
                              th:text="${booking.paymentStatus}"></span>
                    </td>
                    <td>
                        <form th:if="${booking.bookingStatus.name() == 'PENDING'}"
                              th:action="@{/admin/bookings/{id}/confirm(id=${booking.bookingId})}"
                              method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-success">
                                <i class="bi bi-check-circle"></i> Xác nhận
                            </button>
                        </form>
                        <a th:href="@{/bookings/{id}(id=${booking.bookingId})}"
                           class="btn btn-sm btn-outline-primary">Chi tiết</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
