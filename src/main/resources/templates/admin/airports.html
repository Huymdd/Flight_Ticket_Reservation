<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý sân bay')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-building"></i> Quản lý sân bay</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#airportModal">
            <i class="bi bi-plus-circle"></i> Thêm sân bay
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Mã sân bay</th>
                    <th>Tên sân bay</th>
                    <th>Thành phố</th>
                    <th>Quốc gia</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="airport : ${airports}">
                    <td th:text="${airport.airportId}"></td>
                    <td th:text="${airport.airportCode}"></td>
                    <td th:text="${airport.airportName}"></td>
                    <td th:text="${airport.city}"></td>
                    <td th:text="${airport.country}"></td>
                    <td>
                        <form th:action="@{/admin/airports/{id}/delete(id=${airport.airportId})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-danger"
                                    onclick="return confirm('Xác nhận xóa?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Add Airport Modal -->
    <div class="modal fade" id="airportModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/airports/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Thêm sân bay</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Mã sân bay</label>
                            <input type="text" name="airportCode" class="form-control" required placeholder="VD: SGN">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên sân bay</label>
                            <input type="text" name="airportName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Thành phố</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quốc gia</label>
                            <input type="text" name="country" class="form-control" required value="Việt Nam">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
