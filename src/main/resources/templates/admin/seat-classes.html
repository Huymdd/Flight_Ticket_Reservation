<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Quản lý hạng vé')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-star"></i> Quản lý hạng vé</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#classModal">
            <i class="bi bi-plus-circle"></i> Thêm hạng vé
        </button>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="table-responsive">
        <table class="table table-hover">
            <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Tên hạng vé</th>
                    <th>Mô tả</th>
                    <th>Phụ thu</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="sc : ${seatClasses}">
                    <td th:text="${sc.classId}"></td>
                    <td th:text="${sc.className}"></td>
                    <td th:text="${sc.description}"></td>
                    <td th:text="${#numbers.formatDecimal(sc.extraPrice, 0, 'COMMA', 0, 'POINT') + ' VND'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="classModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/admin/seat-classes/save}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Thêm hạng vé</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Tên hạng vé</label>
                            <input type="text" name="className" class="form-control" required placeholder="VD: Economy, Business, First Class">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phụ thu (VND)</label>
                            <input type="number" name="extraPrice" class="form-control" required value="0">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
